<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康日誌 Pro - 嘉恩雲端同步版</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --primary: #6366f1; --food: #f59e0b; --exe: #10b981; --water: #3b82f6; --bg: #f3f4f6; }
    body { font-family: -apple-system, "微軟正黑體", sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
    .container { width: 100%; max-width: 500px; margin: auto; }
    .header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; padding: 25px 20px; border-radius: 24px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); }
    .header h1 { margin: 0; font-size: 1.5rem; }
    .goal-box { margin-top: 15px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; }
    .progress-bg { background: rgba(255,255,255,0.3); height: 8px; border-radius: 4px; margin-top: 5px; overflow: hidden; }
    #progressFill { background: #fff; height: 100%; width: 0%; transition: 0.5s; }
    .dash-row { display: flex; justify-content: space-between; text-align: center; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; margin-top: 15px; }
    .dash-item b { font-size: 1.1rem; display: block; }
    .dash-item span { font-size: 0.7rem; opacity: 0.9; }
    .chart-card, .form-card, .water-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
    #weightChart { width: 100% !important; height: 180px !important; }
    .water-grid { display: flex; align-items: center; justify-content: space-between; }
    .btn-water { background: var(--water); color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .full { grid-column: span 2; }
    label { font-size: 0.75rem; color: #64748b; font-weight: bold; margin-bottom: 4px; display: block; }
    input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 14px; outline: none; }
    .btn { border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
    .btn-save { background: var(--primary); color: white; margin-bottom: 10px; }
    .btn-excel { background: #10b981; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .day-card { background: white; border-radius: 18px; padding: 16px; margin-bottom: 15px; border-left: 6px solid var(--primary); }
    .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .day-date { font-weight: 800; }
    .weight-tag { background: #f1f5f9; padding: 4px 10px; border-radius: 8px; font-weight: bold; }
    .entry { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.9rem; border-top: 1px solid #f8fafc; align-items: center; }
    .tag { font-size: 0.7rem; color: white; padding: 2px 6px; border-radius: 5px; margin-right: 8px; }
    .del-btn { color: #cbd5e1; border: none; background: none; cursor: pointer; font-size: 1.1rem; }
    .diff-up { color: #ef4444; font-size: 0.75rem; }
    .diff-down { color: #22c55e; font-size: 0.75rem; }
    #syncStatus { font-size: 0.6rem; color: #fff; text-align: center; margin-top: 5px; opacity: 0.6; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <span style="font-size:0.8rem; opacity:0.8;">HEALTH TRACKER PRO</span>
    <h1>嘉恩體重記錄</h1>
    <div id="syncStatus">資料已連線</div>
    
    <div class="goal-box">
      <div style="display:flex; justify-content:space-between; font-size:0.75rem;">
        <span>瘦身進度百分比</span>
        <strong id="goalPercent">0%</strong>
      </div>
      <div class="progress-bg"><div id="progressFill"></div></div>
    </div>

    <div class="dash-row">
      <div class="dash-item"><b id="dashW">--</b><span>目前體重</span></div>
      <div class="dash-item"><b id="dashGoal">--</b><span>目標體重</span></div>
      <div class="dash-item"><b id="dashReduced" style="color: #6ee7b7;">0</b><span>已減重量</span></div>
    </div>
  </div>

  <div class="water-card">
    <div class="water-grid">
      <div>
        <label>💧 今日飲水</label>
        <b id="dashWater" style="font-size: 1.2rem; color: var(--water);">0</b> <span style="font-size:0.8rem">ml</span>
      </div>
      <button class="btn-water" onclick="addWater()">＋ 250ml</button>
    </div>
  </div>

  <div class="chart-card">
    <label>📈 最近 14 次體重趨勢</label>
    <canvas id="weightChart"></canvas>
  </div>

  <div class="form-card">
    <div style="margin-bottom:12px">
      <label>📅 紀錄日期</label>
      <input type="date" id="mDate">
    </div>
    <div class="input-group">
      <div><label>⚖️ 體重 (kg)</label><input type="number" step="0.1" id="mWeight" placeholder="必填"></div>
      <div><label>🍱 餐次</label><select id="mMeal"><option>早餐</option><option>午餐</option><option>晚餐</option><option>點心</option></select></div>
      <div class="full"><label>🥗 食物內容</label><input type="text" id="mFood" placeholder="吃了什麼？"></div>
      <div class="full"><label>🔥 攝取熱量 (kcal)</label><input type="number" id="mIn" placeholder="輸入熱量"></div>
    </div>
    <div class="input-group" style="border-top: 1px dashed #eee; padding-top: 12px;">
      <div class="full"><label>🏃‍♂️ 運動項目</label><input type="text" id="mExe" placeholder="做了什麼運動？"></div>
      <div class="full"><label>💦 運動消耗 (kcal)</label><input type="number" id="mOut" placeholder="消耗熱量"></div>
    </div>
    <button class="btn btn-save" id="btnSave" onclick="handleSave()">儲存並同步到雲端</button>
    <button class="btn btn-excel" onclick="exportToExcel()">📊 匯出資料 (Excel)</button>
  </div>
  <div id="logContent"></div>
</div>

<script>
// --- 設定區域 ---
const GAS_URL = "https://script.google.com/macros/s/AKfycbzrPgsFkOORFnXzthANFH1GrS8Lns17btD3oeYZRmnQB-KYYUd6ik8AA7W5pT08nAOgMw/exec"; 
const GOAL_WEIGHT = 85;   // 目標體重
const START_WEIGHT = 110; // 初始體重

let store = JSON.parse(localStorage.getItem("v6_data")) || [];
let chartInstance = null;

// 時區修正：取得台灣今日日期
function getTWDate() {
    const now = new Date();
    const twTime = new Date(now.getTime() + (8 * 60 * 60 * 1000));
    return twTime.toISOString().split('T')[0];
}
document.getElementById('mDate').value = getTWDate();

// --- 核心同步功能 ---

// 從雲端抓取最新資料 (定時整理用)
async function syncFromCloud() {
    if (!GAS_URL.includes("https")) return;
    const status = document.getElementById('syncStatus');
    status.innerText = "同步中...";
    
    try {
        const resp = await fetch(GAS_URL);
        const cloudData = await resp.json();
        if (cloudData && cloudData.length > 0) {
            // 以雲端為最終準則，覆蓋本地舊資料
            store = cloudData.map(item => ({
                ...item,
                date: item.date.includes('T') ? item.date.split('T')[0] : item.date
            }));
            localStorage.setItem("v6_data", JSON.stringify(store));
            render();
            status.innerText = "上次同步：" + new Date().toLocaleTimeString();
        }
    } catch(e) { 
        status.innerText = "雲端連線失敗，稍後再試";
    }
}

// 每 5 分鐘自動整理一次 (300,000 毫秒)
setInterval(syncFromCloud, 300000);

async function init() {
    render(); // 先用本地資料顯示畫面
    await syncFromCloud(); // 啟動時立刻整理一次
}

async function addWater() {
    const date = document.getElementById('mDate').value;
    const item = { id: Date.now(), type: 'water', date, name: '喝水', val: 250 };
    store.push(item);
    localStorage.setItem("v6_data", JSON.stringify(store));
    render();
    try { fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(item) }); } catch(e) {}
}

async function handleSave() {
    const btn = document.getElementById('btnSave');
    const date = document.getElementById('mDate').value;
    const weight = document.getElementById('mWeight').value;
    const foodName = document.getElementById('mFood').value;
    const calIn = document.getElementById('mIn').value;
    const meal = document.getElementById('mMeal').value;
    const exeName = document.getElementById('mExe').value;
    const calOut = document.getElementById('mOut').value;

    if (!weight && !foodName && !exeName) return alert("請輸入內容");

    btn.disabled = true;
    btn.innerText = "同步中...";

    const nowId = Date.now();
    const items = [];
    if (weight) items.push({ id: nowId, type: 'weight', date, val: parseFloat(weight), name: '體重紀錄' });
    if (foodName || calIn) items.push({ id: nowId + 1, type: 'food', date, meal, name: foodName || "飲食", val: parseInt(calIn) || 0 });
    if (exeName || calOut) items.push({ id: nowId + 2, type: 'exe', date, name: exeName || "運動", val: parseInt(calOut) || 0 });

    for (let item of items) {
        store.push(item);
        try { await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(item) }); } catch(e) {}
    }

    localStorage.setItem("v6_data", JSON.stringify(store));
    ["mWeight", "mFood", "mIn", "mExe", "mOut"].forEach(id => document.getElementById(id).value = "");
    btn.disabled = false;
    btn.innerText = "儲存並同步到雲端";
    render();
}

function render() {
    const container = document.getElementById('logContent');
    container.innerHTML = "";
    const today = getTWDate();

    const groups = {};
    store.forEach(item => {
        const dKey = item.date.includes('T') ? item.date.split('T')[0] : item.date;
        if (!groups[dKey]) groups[dKey] = { weightItem: null, list: [] };
        if (item.type === 'weight') groups[dKey].weightItem = item;
        else groups[dKey].list.push(item);
    });

    const weightHistory = store.filter(i => i.type === 'weight').sort((a, b) => new Date(a.date) - new Date(b.date));
    const todayRecords = store.filter(i => (i.date.includes('T') ? i.date.split('T')[0] : i.date) === today);
    
    const currentW = weightHistory.length ? weightHistory[weightHistory.length - 1].val : null;
    
    document.getElementById('dashW').innerText = currentW ? currentW + "kg" : "--";
    document.getElementById('dashGoal').innerText = GOAL_WEIGHT + "kg";
    document.getElementById('dashWater').innerText = todayRecords.filter(i => i.type === 'water').reduce((s, i) => s + i.val, 0);
    
    if (currentW) {
        const reduced = (START_WEIGHT - currentW).toFixed(1);
        document.getElementById('dashReduced').innerText = (reduced > 0 ? reduced : 0) + "kg";
        let prog = ((START_WEIGHT - currentW) / (START_WEIGHT - GOAL_WEIGHT) * 100).toFixed(0);
        prog = Math.max(0, Math.min(100, prog));
        document.getElementById('progressFill').style.width = prog + "%";
        document.getElementById('goalPercent').innerText = prog + "%";
    }

    updateChart(weightHistory);

    Object.keys(groups).sort((a, b) => new Date(b) - new Date(a)).forEach(date => {
        const g = groups[date];
        let diff = "";
        if (g.weightItem) {
            const idx = weightHistory.findIndex(i => i.id === g.weightItem.id);
            if (idx > 0) {
                const d = (g.weightItem.val - weightHistory[idx-1].val).toFixed(1);
                diff = d > 0 ? `<span class="diff-up">▲${d}</span>` : `<span class="diff-down">▼${Math.abs(d)}</span>`;
            }
        }

        let itemsHtml = g.list.map(i => {
            let color = '#f59e0b';
            if(i.type==='exe') color = '#10b981';
            if(i.type==='water') color = '#3b82f6';
            return `
            <div class="entry">
                <span><span class="tag" style="background:${color}">${i.type==='food' ? i.meal : (i.type==='water'?'飲水':'運動')}</span>${i.name}</span>
                <span>${i.type==='food'?'+':(i.type==='water'?'':'-')}${i.val}${i.type==='water'?'ml':'k'} <button class="del-btn" onclick="deleteItem(${i.id})">✕</button></span>
            </div>`}).join('');

        if (g.weightItem) {
            itemsHtml += `
                <div class="entry" style="border-top: 1px dashed #eee; margin-top: 5px; padding-top: 8px; opacity: 0.8;">
                    <span><span class="tag" style="background:#6366f1">數據</span>當日體重紀錄</span>
                    <span>${g.weightItem.val}kg <button class="del-btn" onclick="deleteItem(${g.weightItem.id})">✕</button></span>
                </div>`;
        }

        const card = document.createElement('div');
        card.className = 'day-card';
        card.innerHTML = `<div class="day-header"><span class="day-date">${date}</span><div class="weight-tag">${g.weightItem ? g.weightItem.val + ' kg ' + diff : '--'}</div></div>${itemsHtml}`;
        container.appendChild(card);
    });
}

function updateChart(data) {
    const canvas = document.getElementById('weightChart');
    const ctx = canvas.getContext('2d');
    if (chartInstance) chartInstance.destroy();
    if (data.length < 1) return;
    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.slice(-14).map(d => (d.date.includes('T') ? d.date.split('T')[0] : d.date).slice(5)),
            datasets: [{ 
                label: '體重', 
                data: data.slice(-14).map(d => d.val), 
                borderColor: '#6366f1', 
                backgroundColor: 'rgba(99, 102, 241, 0.1)',
                fill: true, tension: 0.4, pointRadius: 6, pointBackgroundColor: '#6366f1'
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false, ticks: { stepSize: 0.5 } } } }
    });
}

function deleteItem(id) {
    if (confirm("注意：此動作僅刪除手機暫存。若要徹底刪除，請至 Google 試算表刪除該列，網頁將在定時整理後自動更新。")) {
        store = store.filter(i => i.id !== id);
        localStorage.setItem("v6_data", JSON.stringify(store));
        render();
    }
}

function exportToExcel() {
    const excelData = store.map(i => ({ "日期": i.date, "類型": i.type, "數值": i.val, "項目": i.name }));
    const worksheet = XLSX.utils.json_to_sheet(excelData);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "健康紀錄");
    XLSX.writeFile(workbook, "嘉恩紀錄.xlsx");
}

init();
</script>
</body>
</html>
