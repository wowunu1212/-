// ... (前面 CSS 樣式保持不變) ...

<script>
const GAS_URL = "你的 GAS 網址"; // 記得填入原本那串網址
const GOAL_WEIGHT = 85; 
const START_WEIGHT = 110; 

let store = []; // 改為空陣列，啟動時強制從雲端抓
let chartInstance = null;

// 時區校正：強制取得台灣日期 (UTC+8)
function getTWDate() {
    return new Date(new Date().getTime() + (8 * 60 * 60 * 1000)).toISOString().split('T')[0];
}
document.getElementById('mDate').value = getTWDate();

// --- 關鍵修改：定時整理功能 ---

async function syncFromCloud() {
  if (!GAS_URL.includes("https")) return;
  
  console.log("正在執行定時整理...");
  try {
    const resp = await fetch(GAS_URL);
    const cloudData = await resp.json();
    if (cloudData && cloudData.length > 0) {
      // 徹底以雲端為準，覆蓋本地舊資料
      store = cloudData.map(item => ({
        ...item,
        date: item.date.includes('T') ? item.date.split('T')[0] : item.date
      }));
      localStorage.setItem("v6_data", JSON.stringify(store));
      render();
    }
  } catch(e) { console.log("連線中..."); }
}

// 設定：每 5 分鐘 (300,000 毫秒) 自動整理一次
setInterval(syncFromCloud, 300000); 

// 初始化
async function init() {
  // 先顯示本地現有的，讓嘉恩不用等
  const local = localStorage.getItem("v6_data");
  if (local) {
    store = JSON.parse(local);
    render();
  }
  // 立刻跑一次雲端同步，確保資料是最新的
  await syncFromCloud();
}

// 修改後的刪除功能：增加提醒
function deleteItem(id) {
  if (confirm("注意：此動作僅刪除手機暫存。若要徹底刪除，請至 Google 試算表刪除該列，網頁將在下次整理時自動更新。")) {
    store = store.filter(i => i.id !== id);
    localStorage.setItem("v6_data", JSON.stringify(store));
    render();
  }
}

// ... (其餘 handleSave, render, updateChart 函數保持不變) ...

init();
</script>
