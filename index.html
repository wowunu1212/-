<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康日誌 Pro - Excel 匯出版</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --primary: #6366f1; --food: #f59e0b; --exe: #10b981; --bg: #f3f4f6; }
    body { font-family: -apple-system, "微軟正黑體", sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
    .container { width: 100%; max-width: 500px; margin: auto; }

    /* 頂部看板 */
    .header { 
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); 
      color: white; padding: 25px 20px; border-radius: 24px; margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
    }
    .header h1 { margin: 0; font-size: 1.5rem; }
    .dash-row { display: flex; justify-content: space-between; text-align: center; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; margin-top: 15px; }
    .dash-item b { font-size: 1.2rem; display: block; }
    .dash-item span { font-size: 0.7rem; opacity: 0.9; }

    /* 圖表與表單 */
    .chart-card, .form-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
    #weightChart { width: 100% !important; height: 180px !important; }

    .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .full { grid-column: span 2; }
    label { font-size: 0.75rem; color: #64748b; font-weight: bold; margin-bottom: 4px; display: block; }
    input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 14px; }
    
    .btn { border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
    .btn-save { background: var(--primary); color: white; margin-bottom: 10px; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
    .btn-excel { background: #10b981; color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); display: flex; align-items: center; justify-content: center; gap: 8px; }
    
    /* 日誌清單 */
    .day-card { background: white; border-radius: 18px; padding: 16px; margin-bottom: 15px; border-left: 6px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .day-date { font-weight: 800; color: #334155; }
    .weight-tag { background: #f1f5f9; padding: 4px 10px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; }
    .entry { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.9rem; border-top: 1px solid #f8fafc; }
    .tag { font-size: 0.7rem; color: white; padding: 2px 6px; border-radius: 5px; margin-right: 6px; }
    .del-btn { color: #cbd5e1; border: none; background: none; cursor: pointer; font-weight: bold; }
    .diff-up { color: #ef4444; font-size: 0.75rem; }
    .diff-down { color: #22c55e; font-size: 0.75rem; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <span style="font-size:0.8rem; opacity:0.8;">HEALTH TRACKER PRO</span>
    <h1>🐟體重記錄</h1>
    <div class="dash-row">
      <div class="dash-item"><b id="dashW">--</b><span>目前體重</span></div>
      <div class="dash-item"><b id="dashIn">0</b><span>今日攝取</span></div>
      <div class="dash-item"><b id="dashOut">0</b><span>今日消耗</span></div>
    </div>
  </div>

  <div class="chart-card">
    <label>📈 最近 14 次體重變化趨勢</label>
    <canvas id="weightChart"></canvas>
  </div>

  <div class="form-card">
    <div style="margin-bottom:12px">
      <label>📅 紀錄日期</label>
      <input type="date" id="mDate">
    </div>
    
    <div class="input-group">
      <div><label>⚖️ 體重 (kg)</label><input type="number" step="0.1" id="mWeight" placeholder="選填"></div>
      <div><label>🍱 餐次</label><select id="mMeal"><option>早餐</option><option>午餐</option><option>晚餐</option><option>點心</option></select></div>
      <div class="full"><label>🥗 食物內容</label><input type="text" id="mFood" placeholder="吃了什麼？"></div>
      <div class="full"><label>🔥 攝取熱量 (kcal)</label><input type="number" id="mIn" placeholder="輸入熱量"></div>
    </div>

    <div class="input-group" style="border-top: 1px dashed #eee; padding-top: 12px;">
      <div class="full"><label>🏃‍♂️ 運動項目</label><input type="text" id="mExe" placeholder="做了什麼運動？"></div>
      <div class="full"><label>💦 運動消耗 (kcal)</label><input type="number" id="mOut" placeholder="消耗熱量"></div>
    </div>

    <button class="btn btn-save" onclick="handleSave()">儲存今日數據</button>
    <button class="btn btn-excel" onclick="exportToExcel()">📊 匯出資料 (Excel)</button>
  </div>

  <div id="logContent"></div>
</div>

<script>
let store = JSON.parse(localStorage.getItem("v6_data")) || [];
let chartInstance = null;
document.getElementById('mDate').value = new Date().toISOString().split('T')[0];

function handleSave() {
  const date = document.getElementById('mDate').value;
  const weight = document.getElementById('mWeight').value;
  const foodName = document.getElementById('mFood').value;
  const calIn = document.getElementById('mIn').value;
  const meal = document.getElementById('mMeal').value;
  const exeName = document.getElementById('mExe').value;
  const calOut = document.getElementById('mOut').value;

  if (!weight && !foodName && !exeName) return alert("請填寫內容再儲存");

  const nowId = Date.now();
  if (weight) store.push({ id: nowId + 1, type: 'weight', date, val: parseFloat(weight), name: '體重紀錄' });
  if (foodName || calIn) store.push({ id: nowId + 2, type: 'food', date, meal, name: foodName || "飲食", val: parseInt(calIn) || 0 });
  if (exeName || calOut) store.push({ id: nowId + 3, type: 'exe', date, name: exeName || "運動", val: parseInt(calOut) || 0 });

  localStorage.setItem("v6_data", JSON.stringify(store));
  ["mWeight", "mFood", "mIn", "mExe", "mOut"].forEach(id => document.getElementById(id).value = "");
  render();
}

// 🔥 核心功能：匯出 Excel
function exportToExcel() {
  if (store.length === 0) return alert("目前還沒有資料可以匯出喔！");

  // 整理資料格式
  const excelData = store.map(item => ({
    "日期": item.date,
    "類型": item.type === 'weight' ? '體重' : (item.type === 'food' ? '飲食' : '運動'),
    "餐次/項目": item.meal || item.name,
    "內容": item.name || '',
    "數值(kg/kcal)": item.val
  }));

  // 排序：按日期由新到舊
  excelData.sort((a, b) => new Date(b["日期"]) - new Date(a["日期"]));

  const worksheet = XLSX.utils.json_to_sheet(excelData);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "健康紀錄");

  // 檔名加上今天日期
  const today = new Date().toISOString().split('T')[0];
  XLSX.writeFile(workbook, `健康紀錄回報_${today}.xlsx`);
}

function render() {
  const container = document.getElementById('logContent');
  container.innerHTML = "";
  const today = new Date().toISOString().split('T')[0];

  const groups = {};
  store.forEach(item => {
    if (!groups[item.date]) groups[item.date] = { weight: null, list: [] };
    if (item.type === 'weight') groups[item.date].weight = item.val;
    else groups[item.date].list.push(item);
  });

  const sortedDates = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));
  const weightHistory = store.filter(i => i.type === 'weight').sort((a,b) => new Date(a.date) - new Date(b.date));

  const todayRecords = store.filter(i => i.date === today);
  document.getElementById('dashIn').innerText = todayRecords.filter(i => i.type === 'food').reduce((s, i) => s + i.val, 0);
  document.getElementById('dashOut').innerText = todayRecords.filter(i => i.type === 'exe').reduce((s, i) => s + i.val, 0);
  document.getElementById('dashW').innerText = weightHistory.length ? weightHistory[weightHistory.length-1].val + "kg" : "--";

  updateChart(weightHistory);

  sortedDates.forEach(date => {
    const data = groups[date];
    let diffHtml = "";
    if (data.weight) {
      const idx = weightHistory.findIndex(i => i.date === date && i.val === data.weight);
      if (idx > 0) {
        const diff = (data.weight - weightHistory[idx-1].val).toFixed(1);
        diffHtml = diff > 0 ? `<span class="diff-up">▲${diff}</span>` : `<span class="diff-down">▼${Math.abs(diff)}</span>`;
      }
    }

    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div class="day-header"><span class="day-date">${date}</span><div class="weight-tag">${data.weight ? data.weight + ' kg ' + diffHtml : '--'}</div></div>
      ${data.list.map(item => `
        <div class="entry">
          <span><span class="tag" style="background:${item.type==='food'?'#f59e0b':'#10b981'}">${item.type==='food' ? item.meal : '運動'}</span>${item.name}</span>
          <span>${item.type==='food'?'+':'-'}${item.val}k <button class="del-btn" onclick="deleteItem(${item.id})">✕</button></span>
        </div>
      `).join('')}
    `;
    container.appendChild(card);
  });
}

function updateChart(weightData) {
  const ctx = document.getElementById('weightChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  if (weightData.length < 2) return;
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: weightData.slice(-14).map(d => d.date.slice(5)), // 改為最近 14 次
      datasets: [{
        label: '體重 (kg)',
        data: weightData.slice(-14).map(d => d.val),
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99, 102, 241, 0.1)',
        fill: true,
        tension: 0.4
      }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
}

function deleteItem(id) {
  if (confirm("刪除這筆紀錄？")) {
    store = store.filter(i => i.id !== id);
    localStorage.setItem("v6_data", JSON.stringify(store));
    render();
  }
}

render();
</script>
</body>
</html>
